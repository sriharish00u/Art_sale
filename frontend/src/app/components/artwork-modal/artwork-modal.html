<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
  (click)="close.emit()">

  <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>

  <div
    class="relative bg-dark-800 rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl"
    (click)="$event.stopPropagation()">

    <button
      (click)="close.emit()"
      class="absolute top-4 right-4 z-10 bg-black/50 hover:bg-black/70 text-white rounded-full p-2 transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>

    <img
      [src]="product().image"
      [alt]="product().title"
      class="w-full rounded-t-2xl object-contain bg-black/40 max-h-[80vh]"
      draggable="false"
      (contextmenu)="$event.preventDefault()" />

    <div class="p-6 space-y-4">
      <div class="flex items-start justify-between gap-4">
        <div>
          <span class="text-xs font-medium text-accent uppercase tracking-wider">{{ product().category }}</span>
          <h2 class="text-2xl font-bold text-white mt-1">{{ product().title }}</h2>
        </div>
        <span class="text-2xl font-bold text-accent whitespace-nowrap">₹{{ product().price }}</span>
      </div>

      <p class="text-gray-400 leading-relaxed">{{ product().description }}</p>

      <a
        [href]="whatsappLink()"
        target="_blank"
        class="inline-flex items-center gap-2 bg-accent hover:bg-accent-hover text-black font-medium px-6 py-3 rounded-lg transition w-full justify-center text-lg">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Buy on WhatsApp
      </a>
    </div>
  </div>
</div>
