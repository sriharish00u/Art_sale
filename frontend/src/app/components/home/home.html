<button (click)="toggleSidebar()"
  class="fixed top-4 right-4 z-50 lg:hidden bg-dark-800 text-white p-2.5 rounded-lg shadow-lg hover:bg-dark-600 transition">
  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
  </svg>
</button>

@if (sidebarOpen()) {
  <div class="fixed inset-0 bg-black/60 z-30 lg:hidden" (click)="sidebarOpen.set(false)"></div>
}

<div class="min-h-screen flex">
  <div class="flex-1">
    <app-hero
      [categories]="categories()"
      [selectedCategory]="selectedCategory()"
      (categoryChange)="filterByCategory($event)" />

    <main class="px-4 sm:px-6 lg:px-8 pb-16">
      <app-gallery
        [products]="products()"
        (productClick)="openModal($event)" />
    </main>
  </div>

  <app-sidebar [isOpen]="sidebarOpen()" (closeSidebar)="sidebarOpen.set(false)" />
</div>

@if (isModalOpen() && selectedProduct()) {
  <app-artwork-modal
    [product]="selectedProduct()!"
    (close)="closeModal()" />
}
