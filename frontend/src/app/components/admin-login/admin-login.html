<div class="min-h-screen bg-dark-900 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">Admin Login</h1>
      <p class="text-gray-400 mt-2">Enter your credentials to continue</p>
    </div>

    <form (ngSubmit)="login()" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full bg-dark-700 border border-dark-500 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-accent transition" />
      </div>

      <div>
        <label class="block text-sm text-gray-400 mb-1">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          class="w-full bg-dark-700 border border-dark-500 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-accent transition" />
      </div>

      @if (error) {
        <p class="text-red-400 text-sm">{{ error }}</p>
      }

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-accent hover:bg-accent-hover text-black font-medium py-2.5 rounded-lg transition disabled:opacity-50">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
  </div>
</div>
